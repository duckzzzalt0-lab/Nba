<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5v5 Browser Basketball Game</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#scoreboard { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); color:white; padding:10px; border-radius:5px; font-size:18px; }
#shotMeterContainer { position:absolute; bottom:50px; left:50%; transform:translateX(-50%); width:200px; height:20px; background:gray; display:none; border-radius:5px; }
#shotMeter { height:100%; width:0; background:lime; border-radius:5px; }
#mobileControls { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:none; }
.btn { padding:10px 15px; margin:5px; background:rgba(0,0,0,0.6); color:white; font-size:16px; border:none; border-radius:5px; }
#timeoutButton { position:absolute; top:50px; left:10px; padding:8px 12px; font-size:16px; }
</style>
</head>
<body>

<div id="scoreboard">Score: 0 - 0 | Q1 | 2:00</div>
<div id="shotMeterContainer"><div id="shotMeter"></div></div>
<div id="mobileControls">
  <button class="btn" id="btnUp">↑</button>
  <button class="btn" id="btnDown">↓</button>
  <button class="btn" id="btnLeft">←</button>
  <button class="btn" id="btnRight">→</button>
  <button class="btn" id="btnShoot">Shoot</button>
  <button class="btn" id="btnPass">Pass</button>
  <button class="btn" id="btnToggle">Toggle Controls</button>
</div>
<button id="timeoutButton">Timeout</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script>

// ------------------- SCENE SETUP -------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,18,28);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0,1,0);
controls.update();

const ambientLight = new THREE.AmbientLight(0xffffff,0.7);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff,0.8);
directionalLight.position.set(5,15,5);
scene.add(directionalLight);

// ------------------- COURT & STADIUM -------------------
const courtGeo = new THREE.PlaneGeometry(28,15);
const courtMat = new THREE.MeshPhongMaterial({color:0x228B22});
const court = new THREE.Mesh(courtGeo,courtMat);
court.rotation.x=-Math.PI/2;
scene.add(court);

// Crowd stands
function addStands(){
  const standGeo = new THREE.BoxGeometry(30,3,2);
  const standMat = new THREE.MeshPhongMaterial({color:0x888888});
  const leftStand = new THREE.Mesh(standGeo,standMat);
  leftStand.position.set(0,1.5,-11);
  scene.add(leftStand);
  const rightStand = new THREE.Mesh(standGeo,standMat);
  rightStand.position.set(0,1.5,11);
  scene.add(rightStand);
}
addStands();

// Hoops
function createHoop(z){
  const hoopGeo = new THREE.TorusGeometry(0.5,0.05,16,100);
  const hoopMat = new THREE.MeshPhongMaterial({color:0xff0000});
  const hoop = new THREE.Mesh(hoopGeo,hoopMat);
  hoop.position.set(0,3,z);
  hoop.rotation.x=Math.PI/2;
  scene.add(hoop);

  const backGeo = new THREE.BoxGeometry(1.5,1,0.1);
  const backMat = new THREE.MeshPhongMaterial({color:0xffffff});
  const backboard = new THREE.Mesh(backGeo,backMat);
  backboard.position.set(0,3.5,z+Math.sign(z)*0.25);
  scene.add(backboard);

  return hoop;
}
const hoop1 = createHoop(-7); // Top
const hoop2 = createHoop(7);  // Bottom

// ------------------- PLAYERS -------------------
function createPlayer(color,x,z){
  const geo = new THREE.BoxGeometry(0.6,1.8,0.6);
  const mat = new THREE.MeshPhongMaterial({color});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(x,0.9,z);
  scene.add(mesh);
  return {mesh, stamina:100, hasBall:false, team:color};
}

// Teams
const myTeam = [];
const aiTeam = [];
for(let i=0;i<5;i++){ myTeam.push(createPlayer(0x0000ff,-6+3*i,6)); }
for(let i=0;i<5;i++){ aiTeam.push(createPlayer(0xff0000,-6+3*i,-6)); }

// ------------------- BALL -------------------
const ballGeo = new THREE.SphereGeometry(0.25,32,32);
const ballMat = new THREE.MeshPhongMaterial({color:0xffa500});
const ball = new THREE.Mesh(ballGeo,ballMat);
ball.position.set(0,0.25,5);
scene.add(ball);

let ballHolder = myTeam[0];
ballHolder.hasBall = true;
let ballVelocity = new THREE.Vector3(0,0,0);
const gravity = -0.02;

// ------------------- GAME VARIABLES -------------------
let score = [0,0];
let quarter = 1;
let gameTime = 120; // 2 minutes per quarter
let timeoutActive = false;
let foulCounts = [0,0];
const scoreboard = document.getElementById('scoreboard');

const shotContainer = document.getElementById('shotMeterContainer');
const shotBar = document.getElementById('shotMeter');
let shotActive=false;
let shotProgress=0;
let shotDirection=1;

// ------------------- MOBILE CONTROLS -------------------
const mobileControls = document.getElementById('mobileControls');
let mobileMode=false;
document.getElementById('btnToggle').addEventListener('click',()=>{
  mobileMode=!mobileMode;
  mobileControls.style.display=mobileMode?'block':'none';
});
const moveDir = {x:0,z:0};
['Up','Down','Left','Right'].forEach(dir=>{
  document.getElementById('btn'+dir).addEventListener('mousedown',()=>{ 
    if(dir==='Up') moveDir.z=-0.1;
    if(dir==='Down') moveDir.z=0.1;
    if(dir==='Left') moveDir.x=-0.1;
    if(dir==='Right') moveDir.x=0.1;
  });
  document.getElementById('btn'+dir).addEventListener('mouseup',()=>{ moveDir.x=0; moveDir.z=0; });
});

// Shoot/Pass
document.getElementById('btnShoot').addEventListener('click',()=>{ if(!shotActive) startShotMeter(); });
document.getElementById('btnPass').addEventListener('click',passBall);

// Timeout
document.getElementById('timeoutButton').addEventListener('click',()=>{ timeoutActive=!timeoutActive; });

// Keyboard
const keys = {};
window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ------------------- GAME FUNCTIONS -------------------
// Shot meter
function startShotMeter(){ shotActive=true; shotProgress=0; shotDirection=1; shotContainer.style.display='block'; }
function updateShotMeter(){
  if(!shotActive) return;
  shotProgress += 0.02 * shotDirection;
  if(shotProgress>=1) shotDirection=-1;
  if(shotProgress<=0) shotDirection=1;
  if(shotProgress>0.45 && shotProgress<0.55) shotBar.style.background='lime';
  else if(shotProgress>0.35 && shotProgress<0.65) shotBar.style.background='yellow';
  else shotBar.style.background='red';
  shotBar.style.width = (shotProgress*100)+'%';
}
