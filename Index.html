<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Basketball Game</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  #scoreboard {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.5); color: white;
    padding: 10px; border-radius: 5px; font-size: 20px;
  }
</style>
</head>
<body>
<div id="scoreboard">Score: 0 | Time: 60</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script>

// --- Scene setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Sky blue

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 7, 12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- Controls ---
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0,1,0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5,10,5);
scene.add(directionalLight);

// --- Court ---
const courtGeometry = new THREE.PlaneGeometry(20,12);
const courtMaterial = new THREE.MeshPhongMaterial({color:0x228B22});
const court = new THREE.Mesh(courtGeometry, courtMaterial);
court.rotation.x = -Math.PI/2;
scene.add(court);

// Court lines
const lineMaterial = new THREE.LineBasicMaterial({color:0xffffff});
const lines = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-10,0.01,-6), new THREE.Vector3(10,0.01,-6), // baseline
  new THREE.Vector3(-10,0.01,6), new THREE.Vector3(10,0.01,6),   // other baseline
  new THREE.Vector3(-5,0.01,-6), new THREE.Vector3(-5,0.01,6),   // left side
  new THREE.Vector3(5,0.01,-6), new THREE.Vector3(5,0.01,6)      // right side
]);
const lineMesh = new THREE.LineSegments(lines, lineMaterial);
scene.add(lineMesh);

// --- Hoop & backboard ---
const hoopGeometry = new THREE.TorusGeometry(0.5,0.05,16,100);
const hoopMaterial = new THREE.MeshPhongMaterial({color:0xff0000});
const hoop = new THREE.Mesh(hoopGeometry, hoopMaterial);
hoop.position.set(0,3,-5);
hoop.rotation.x = Math.PI/2;
scene.add(hoop);

// Backboard
const backboardGeometry = new THREE.BoxGeometry(1.5,1,0.1);
const backboardMaterial = new THREE.MeshPhongMaterial({color:0xffffff});
const backboard = new THREE.Mesh(backboardGeometry, backboardMaterial);
backboard.position.set(0,3.5,-5.25);
scene.add(backboard);

// --- Player ---
const playerGeometry = new THREE.BoxGeometry(0.5,1.8,0.5);
const playerMaterial = new THREE.MeshPhongMaterial({color:0x0000ff});
const player = new THREE.Mesh(playerGeometry, playerMaterial);
player.position.set(0,0.9,5);
scene.add(player);

// --- Ball ---
const ballGeometry = new THREE.SphereGeometry(0.25,32,32);
const ballMaterial = new THREE.MeshPhongMaterial({color:0xffa500});
const ball = new THREE.Mesh(ballGeometry, ballMaterial);
ball.position.set(0,0.25,4.5);
scene.add(ball);

// Ball physics
let ballVelocity = new THREE.Vector3(0,0,0);
const gravity = -0.02;

// Keyboard input
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Game variables
let score = 0;
let time = 60; // seconds
const scoreboard = document.getElementById('scoreboard');

// Shooting
function shoot() {
  ballVelocity.set(0,0.6,-0.4); // upward + forward
}

// Dunk animation
let dunking = false;
function dunk() {
  if(!dunking && player.position.distanceTo(hoop.position) < 2) {
    dunking = true;
    ballVelocity.set(0,0.8,-0.1);
  }
}

// Crowd (simple colored boxes)
for(let i=-9;i<=9;i+=2){
  const boxGeo = new THREE.BoxGeometry(0.5,1,0.5);
  const boxMat = new THREE.MeshPhongMaterial({color:0xffd700});
  const crowdBox = new THREE.Mesh(boxGeo, boxMat);
  crowdBox.position.set(i,0.5,-7);
  scene.add(crowdBox);
}

// --- Animation loop ---
function animate() {
  requestAnimationFrame(animate);

  // Player movement
  if(keys['a']) player.position.x -= 0.1;
  if(keys['d']) player.position.x += 0.1;
  if(keys['w']) player.position.z -= 0.1;
  if(keys['s']) player.position.z += 0.1;

  // Keep player on court
  player.position.x = Math.max(-9, Math.min(9, player.position.x));
  player.position.z = Math.max(-5, Math.min(5, player.position.z));

  // Ball follows player if close
  const distance = player.position.distanceTo(ball.position);
  if(distance < 1 && !keys[' ']) {
    ball.position.x = player.position.x;
    ball.position.z = player.position.z - 0.5;
    ball.position.y = 0.25;
  }

  // Shoot
  if(keys[' ']) shoot();
  if(keys['Shift']) dunk();

  // Ball physics
  ballVelocity.y += gravity;
  ball.position.add(ballVelocity);

  // Bounce
  if(ball.position.y < 0.25){
    ball.position.y = 0.25;
    ballVelocity.y *= -0.5;
    ballVelocity.x *= 0.9;
    ballVelocity.z *= 0.9;
    dunking = false;
  }

  // Check score
  const hoopTop = new THREE.Vector3(hoop.position.x, hoop.position.y, hoop.position.z);
  if(ball.position.y < hoopTop.y && ball.position.distanceTo(hoopTop) < 0.5 && ballVelocity.y < 0){
    score += 2;
    ball.position.set(player.position.x,0.25,player.position.z-0.5);
    ballVelocity.set(0,0,0);
  }

  // Update scoreboard
  scoreboard.innerText = `Score: ${score} | Time: ${time}`;

  renderer.render(scene,camera);
}

animate();

// --- Countdown timer ---
setInterval(()=>{
  if(time>0) time--;
},1000);

</script>
</body>
</html>
